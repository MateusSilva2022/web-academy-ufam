<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estrutura HTML5</title>
    <style>
        body {
            margin: 20px;
            font-family: Arial, sans-serif;
            background-color: #eee;
        }

        .pagina {
            width: 650px;
            margin: auto;
            background-color: #ddd;
            padding: 15px;
            border-radius: 10px;
        }

        header {
            background-color: #f26c7c;
            padding: 20px;
            font-size: 28px;
            margin-bottom: 10px;
        }

        nav {
            background-color: #4cc9a6;
            padding: 10px;
            margin-bottom: 10px;
        }

        .container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        aside {
            background-color: #e6b8be;
            width: 30%;
            padding: 20px;
        }

        main {
            background-color: #a8c7d8;
            width: 70%;
            padding: 15px;
        }

        article {
            background-color: #6ec1e4;
            padding: 15px;
        }

        figure {
            background-color: #f2e3a1;
            padding: 15px;
            margin-bottom: 10px;
        }

        p {
            background-color: #d9f0a3;
            padding: 10px;
            margin-bottom: 10px;
        }

        section {
            background-color: #1e90ff;
            padding: 15px;
        }

        footer {
            background-color: #9b6de3;
            padding: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="pagina">

    <header><center>&lt;header&gt;</center></header>

    <nav><center>&lt;nav&gt;</center></nav>

    <div class="container">

        <aside><center>&lt;aside&gt;</center></aside>

        <main>
            <center>&lt;main&gt;</center>

            <article>
                <center>&lt;article&gt;</center>

                <figure><center>&lt;figure&gt;</center></figure>

                <center><p>&lt;p&gt;</p></center>

                <section><center>&lt;section&gt;</center></section>

            </article>

        </main>

    </div>

    <footer><center>&lt;footer&gt;</center></footer>

</div>

</body>
</html>
